services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1-sweepstake
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/f1-sweepstake.db
      - NODE_ENV=production
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - f1-data:/app/data
    networks:
      - proxy
      - default

  cron:
    image: alpine:3.21
    container_name: f1-sweepstake-cron
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./docker/crontab:/etc/crontabs/root:ro
    command: crond -f -l 2

  sqlitebrowser:
    image: lscr.io/linuxserver/sqlitebrowser:latest
    container_name: f1-sweepstake-db-gui
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PUID=0
      - PGID=0
      - TZ=Europe/London
    volumes:
      - f1-data:/data
    shm_size: "1gb"
    depends_on:
      - app

volumes:
  f1-data:

networks:
  proxy:
    external: true
