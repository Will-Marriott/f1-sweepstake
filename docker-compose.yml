services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1-sweepstake
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/f1-sweepstake.db
      - NODE_ENV=production
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - f1-data:/app/data

  cron:
    image: alpine:3.21
    container_name: f1-sweepstake-cron
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./docker/crontab:/etc/crontabs/root:ro
    command: crond -f -l 2

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1-sweepstake-db-gui
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=file:/app/data/f1-sweepstake.db
    volumes:
      - f1-data:/app/data
    entrypoint:
      [
        "npx",
        "prisma",
        "studio",
        "--config",
        "./prisma.config.ts",
        "--port",
        "5555",
        "--hostname",
        "0.0.0.0",
      ]

volumes:
  f1-data:
