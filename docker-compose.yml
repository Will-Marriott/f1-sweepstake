services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: f1-sweepstake
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/f1-sweepstake.db
      - NODE_ENV=production
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    volumes:
      - f1-data:/app/data

  cron:
    image: alpine:3.21
    container_name: f1-sweepstake-cron
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./docker/crontab:/etc/crontabs/root:ro
    command: crond -f -l 2

  prisma-studio:
    image: node:22-slim
    container_name: f1-sweepstake-db-gui
    restart: unless-stopped
    working_dir: /usr/src/app
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=file:/data/f1-sweepstake.db
    volumes:
      - ./prisma:/usr/src/app/prisma
      - ./prisma.config.ts:/usr/src/app/prisma.config.ts
      - f1-data:/data
    command: sh -c "npm install prisma@7.3.0 && npx prisma studio --config ./prisma.config.ts --port 5555 --browser none --hostname 0.0.0.0"
    depends_on:
      - app

volumes:
  f1-data:
